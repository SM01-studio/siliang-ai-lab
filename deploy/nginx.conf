# Siliang AI LAB - Nginx 配置
# 部署到: /etc/nginx/sites-available/siliang-api
# 软链接: ln -s /etc/nginx/sites-available/siliang-api /etc/nginx/sites-enabled/

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name api.siliang.cfd;
    return 301 https://$server_name$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name api.siliang.cfd;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/api.siliang.cfd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.siliang.cfd/privkey.pem;

    # SSL 优化
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ==================== Siliang AI LAB 主后端 (端口 5000) ====================
    # 认证 API
    location /api/auth/ {
        proxy_pass http://127.0.0.1:5000/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 应用列表 API
    location /api/apps {
        proxy_pass http://127.0.0.1:5000/api/apps;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 管理员 API
    location /api/admin/ {
        proxy_pass http://127.0.0.1:5000/api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== AI Writer 后端 (端口 5001) ====================
    location /api/writer/ {
        rewrite ^/api/writer/(.*) /api/$1 break;
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接支持（AI 生成可能耗时较长）
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # SSE 流式响应支持
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    # AI Writer 图片和文件下载
    location /api/writer/images/ {
        rewrite ^/api/writer/images/(.*) /api/images/$1 break;
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/writer/download/ {
        rewrite ^/api/writer/download/(.*) /api/download/$1 break;
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ==================== 健康检查 ====================
    location /health {
        proxy_pass http://127.0.0.1:5000/api/health;
        access_log off;
    }

    # 默认拒绝
    location / {
        return 404;
    }
}
