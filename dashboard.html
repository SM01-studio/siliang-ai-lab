<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLD-PDDM AI LAB - 仪表板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .dashboard {
            position: relative;
            z-index: 1;
        }

        .dashboard-header {
            text-align: center;
            padding: 3rem 0 2rem;
        }

        .dashboard-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-subtitle {
            color: var(--text-muted);
        }

        .apps-section {
            margin-top: 2rem;
        }

        .apps-section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .app-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }

        .app-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
        }

        .app-card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
        }

        .app-card-content {
            padding: 1.25rem;
        }

        .app-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .app-card-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .app-card-status {
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 100px;
            font-weight: 500;
        }

        .status-online {
            background: rgba(34, 197, 94, 0.15);
            color: #22C55E;
        }

        .app-card-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .app-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .app-card-link {
            color: var(--primary-light);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .app-card:hover .app-card-link {
            color: var(--secondary);
        }
    </style>
</head>
<body style="background: var(--bg-primary);">
    <!-- 粒子背景 -->
    <canvas id="particles-canvas"></canvas>

    <!-- Header -->
    <header class="header" style="position: relative; z-index: 10;">
        <div class="header-content">
            <a href="dashboard.html" class="logo">
                <div class="logo-icon">S</div>
                <span>CLD-PDDM AI LAB</span>
            </a>

            <nav class="nav">
                <a href="dashboard.html" class="nav-link">应用 Apps</a>
                <a href="admin.html" class="nav-link hidden" id="admin-link">管理 Admin</a>
            </nav>

            <div class="user-menu">
                <span id="user-greeting">你好, 用户</span>
                <div class="user-avatar" id="user-avatar">U</div>
                <button class="btn btn-sm btn-secondary" id="logout-btn">登出</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container dashboard">
        <div class="dashboard-header">
            <h1 class="dashboard-title">欢迎回来</h1>
            <p class="dashboard-subtitle">选择一个应用开始使用 / Select an app to get started</p>
        </div>

        <section class="apps-section">
            <h2 class="apps-section-title">
                <span>📁</span> 可用应用 Available Apps
            </h2>
            <div class="apps-grid" id="apps-grid">
                <div class="glass-card text-center" style="padding: 3rem;">
                    <div class="spinner" style="margin: 0 auto;"></div>
                    <p style="margin-top: 1rem; color: var(--text-muted);">加载中...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script>
        // 粒子效果 - 优化版
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        let isAnimating = true;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            // 限制粒子数量，避免性能问题
            const maxParticles = 80;
            const calculatedCount = Math.floor((canvas.width * canvas.height) / 15000);
            const particleCount = Math.min(calculatedCount, maxParticles);

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2 + 0.3,
                    alpha: Math.random() * 0.4 + 0.1,
                    speed: Math.random() * 0.2 + 0.05,
                    drift: Math.random() * 0.15 - 0.075
                });
            }
        }

        function drawParticles() {
            if (!isAnimating) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.fill();

                p.y -= p.speed;
                p.x += p.drift;

                if (p.y < -10) {
                    p.y = canvas.height + 10;
                    p.x = Math.random() * canvas.width;
                }
            });
            animationId = requestAnimationFrame(drawParticles);
        }

        // 页面不可见时暂停动画，节省资源
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isAnimating = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            } else {
                isAnimating = true;
                drawParticles();
            }
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            createParticles();
        });

        resizeCanvas();
        createParticles();
        drawParticles();

        // 初始化
        async function init() {
            const user = await requireAuth();
            if (!user) return;

            document.getElementById('user-greeting').textContent = `你好, ${user.username}`;
            document.getElementById('user-avatar').textContent = user.username.charAt(0).toUpperCase();

            if (user.role === 'admin') {
                document.getElementById('admin-link').classList.remove('hidden');
            }

            loadApps();
        }

        // 加载应用列表
        async function loadApps() {
            const grid = document.getElementById('apps-grid');

            try {
                const { apps } = await AppsAPI.getAll();

                if (apps.length === 0) {
                    grid.innerHTML = `
                        <div class="glass-card text-center" style="grid-column: 1 / -1; padding: 3rem;">
                            <p style="color: var(--text-muted); margin-bottom: 0.5rem;">暂无可用应用</p>
                            <p style="color: var(--text-muted); font-size: 0.85rem;">请联系管理员分配应用权限</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = apps.map(app => `
                    <div class="app-card" onclick="openApp('${app.url}')">
                        <img src="${app.image_url || 'images/placeholder.png'}" alt="${app.name}" class="app-card-image" loading="lazy">
                        <div class="app-card-content">
                            <div class="app-card-header">
                                <h3 class="app-card-title">${app.name}</h3>
                                <span class="app-card-status status-online">在线 Online</span>
                            </div>
                            <p class="app-card-desc">${app.description || '暂无描述'}</p>
                            <div class="app-card-footer">
                                <span class="app-card-link">
                                    打开应用 Open App →
                                </span>
                                <span style="color: var(--text-muted); font-size: 0.75rem;">v1.0</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `
                    <div class="glass-card text-center" style="grid-column: 1 / -1; padding: 3rem;">
                        <p style="color: var(--text-muted);">加载失败: ${err.message}</p>
                    </div>
                `;
            }
        }

        // 打开应用 - 携带 Token 实现跨域认证
        function openApp(url) {
            const token = TokenManager.get();
            if (token) {
                // 在 URL 中添加 token 参数
                const separator = url.includes('?') ? '&' : '?';
                const urlWithToken = `${url}${separator}auth_token=${encodeURIComponent(token)}`;
                window.open(urlWithToken, '_blank');
            } else {
                window.open(url, '_blank');
            }
        }

        // 登出
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await AuthAPI.logout();
            showToast('已登出 / Logged out');
            window.location.href = '/index.html';
        });

        init();
    </script>
</body>
</html>
